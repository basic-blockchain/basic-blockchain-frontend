name: Merge Policy Guard

on:
  pull_request:
    branches: ["main", "production"]

permissions:
  contents: read

jobs:
  enforce-merge-policy:
    runs-on: ubuntu-latest
    steps:
      - name: Validate source branch policy
        shell: bash
        env:
          BASE_REF: ${{ github.base_ref }}
          HEAD_REF: ${{ github.head_ref }}
        run: |
          base="$BASE_REF"
          head="$HEAD_REF"
          echo "Base: $base | Head: $head"

          # CLAUDE.md chain: develop → qa → staging → production → main.
          # `staging` is therefore a first-class head for base=production
          # alongside the existing release/* and hotfix/* exception paths
          # — without it the documented promotion script collides with the
          # guard and every staging→production PR has to be forced through
          # with --admin.
          if [[ "$base" == "production" ]]; then
            if [[ ! "$head" =~ ^release/ ]] && [[ ! "$head" =~ ^hotfix/ ]] && [[ "$head" != "staging" ]]; then
              echo "PR to production must come from staging, release/* or hotfix/* branches." >&2
              exit 1
            fi
          fi

          if [[ "$base" == "main" ]]; then
            if [[ ! "$head" =~ ^release/ ]] && [[ ! "$head" =~ ^hotfix/ ]] && [[ "$head" != "develop" ]] && [[ "$head" != "production" ]]; then
              echo "PR to main must come from production, develop, release/*, or hotfix/* branches." >&2
              exit 1
            fi
          fi
